<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria Liquid Games</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

  <header class="header">
    <h1 class="press-start-2p-regular">Galeria Liquid Games</h1>
    <span class="press-start-2p-regular">Fotos mais detalhadas dos games a venda na loja</span>
  </header>

  <div class="jogos">
    <div class="jogo">
      <img src="./assets/img/gta-4-otm.jpg" alt="Grand Theft Auto 4 Capa" class="dt-img">
      <div class="botoes">
        <button class="dt" onclick="abrirModal(games.game1)"> <img src="./assets/icons/loupe-otm.png" alt="Loupe Icon"> Detalhes</button>
        <a href="https://shopee.com.br/Jogos-Seminovos-de-PS3-Originais-i.490386670.58206952976?extraParams=%7B%22display_model_id%22%3A159552964230%2C%22model_selection_logic%22%3A3%7D" target="_blank" class="cp"> <img src="./assets/icons/icons8-comprador-50.png" alt="Shoppe Icon"> Comprar</a>
      </div>
    </div>
    <div class="jogo">
      <img src="./assets/img/gta-5-otm.jpg" alt="Grand Theft Auto 5 Capa" class="dt-img">
      <div class="botoes">
        <button class="dt" onclick="abrirModal(games.game2)"> <img src="./assets/icons/loupe-otm.png" alt="Loupe Icon"> Detalhes</button>
        <a href="https://shopee.com.br/Jogos-Seminovos-de-PS3-Originais-i.490386670.58206952976?extraParams=%7B%22display_model_id%22%3A159552964230%2C%22model_selection_logic%22%3A3%7D" target="_blank" class="cp"> <img src="./assets/icons/icons8-comprador-50.png" alt="Shoppe Icon"> Comprar</a>
      </div>
    </div>
    <div class="jogo">
      <img src="./assets/img/naruto-2-otm.jpg" alt="Naruto Shippuden Ultimate Ninja Storm 3 Capa" class="dt-img">
      <div class="botoes">
        <button class="dt" onclick="abrirModal(games.game3)"> <img src="./assets/icons/loupe-otm.png" alt="Loupe Icon"> Detalhes</button>
        <a href="https://shopee.com.br/Jogos-Seminovos-de-PS3-Originais-i.490386670.58206952976?extraParams=%7B%22display_model_id%22%3A159552964230%2C%22model_selection_logic%22%3A3%7D" target="_blank" class="cp"> <img src="./assets/icons/icons8-comprador-50.png" alt="Shoppe Icon"> Comprar</a>
      </div>
    </div>
    <div class="jogo">
      <img src="./assets/img/mvc-otm.jpg" alt="Ultimate Marvel vs Capcom 3 Capa" class="dt-img">
      <div class="botoes">
        <button class="dt" onclick="abrirModal(games.game4)"> <img src="./assets/icons/loupe-otm.png" alt="Loupe Icon"> Detalhes</button>
        <a href="https://shopee.com.br/Ultimate-Marvel-vs-Capcom-3-F%C3%ADsico-PS3-Original-i.490386670.22698907797?extraParams=%7B%22display_model_id%22%3A219179374808%2C%22model_selection_logic%22%3A3%7D" target="_blank" class="cp"> <img src="./assets/icons/icons8-comprador-50.png" alt="Shoppe Icon"> Comprar</a>
      </div>
    </div>

    <div id="modal" class="modal">
      <span class="fechar">&times;</span>
      <img class="modal-img" id="modal-img" />

      <button class="prev">&#10094</button>
      <button class="next">&#10095</button>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
